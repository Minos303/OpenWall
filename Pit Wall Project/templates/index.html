<!DOCTYPE html>
<html>
<head>
    <title>PitWall Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

    <h1>Pit Wall Live</h1>
    <p>Driver Number: {{ user_driver }}</p>
    <p>Team: {{ user_team }}</p>

    <div style="width: 800px; height: 400px;">
        <canvas id="telemetryChart"></canvas>
    </div>

    <script>
        const ctx = document.getElementById('telemetryChart').getContext('2d');
        const chart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: [],
                datasets: [{
                    label: 'Speed (km/h)',
                    data: [],
                    borderColor: 'red',
                    tension: 0.1
                }]
            },
            options: {
                scales: {
                    y: { min: 0, max: 350 }
                }
            }
        });
    </script>

</body>
</html>
